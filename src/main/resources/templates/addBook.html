<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Book</title>
    <!-- Подключение Bootstrap для стилизации -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
          integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <!-- Дополнительные стили для улучшения внешнего вида -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #222222;
        }

        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            color: #222222;
        }

        label {
            font-weight: bold;
            color: #444444;
            display: inline-block;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #dddddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.15s ease-in-out;
        }

        input[type="text"]:focus {
            border-color: #007bff;
        }

        button.btn-primary {
            background-color: #007bff;
            border: none;
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 16px;
            line-height: 1.5;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.15s ease-in-out;
        }

        button.btn-primary:hover {
            background-color: #0056b3;
        }

        .error-message {
            color: #dc3545;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>ADD NEW BOOK</h1>
    <form action="#" th:action="@{/books/add}" th:object="${book}" method="post" onsubmit="return validateForm();">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" th:field="*{title}" required />
        </div>
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" th:field="*{author}" required />
        </div>
        <button type="submit" class="btn btn-primary">Add Book</button>
        <span class="error-message" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Enter the title of the book.</span>
        <span class="error-message" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">Enter the name of the author.</span>
    </form>
</div>
<!-- Скрипты Bootstrap -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"
        integrity="sha384-+YQ4JLhjyBLPDQt//I+STsc9iw4uQqACwlvpsluby4M+RYE6IWOE/YxdhIQ+1ZyvUs"
        crossorigin="anonymous"></script>
</body>
</html>
