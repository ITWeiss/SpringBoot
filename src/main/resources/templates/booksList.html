<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library Books</title>
    <!-- Подключение Bootstrap для стилизации -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
          integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <!-- Дополнительные стили для улучшения внешнего вида -->
    <style>
        /* Основной контейнер */
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            background-color: #fff;
        }

        /* Заголовок страницы */
        h1 {
            text-align: center;
            color: #007bff; /* Синий цвет заголовка */
            margin-bottom: 30px;
        }

        /* Таблица с книгами */
        .table {
            border-collapse: collapse;
            font-size: 14px;
        }

        .table thead th {
            background-color: #f9f9fa;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .table tbody td {
            vertical-align: middle;
            padding: 12px 24px;
            background-color: #fff;
            border-bottom: 1px solid #dee2e6;
        }

        /* Цветовая схема и оформление ссылок */
        a,
        a:hover,
        a:focus {
            color: #007bff; /* Ссылки синие */
            text-decoration: none;
        }

        /* Кнопки */
        .btn {
            padding: 8px 20px;
            font-size: 14px;
            line-height: 1.5;
            border-radius: 3px;
            transition: all 0.15s ease-in-out;
        }

        .btn-primary {
            background-color: #007bff; /* Синяя кнопка */
            border-color: #007bff;
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #0069d9; /* Темно-синий при наведении */
            border-color: #0062cc;
        }

        /* Разделители строк */
        hr {
            margin: 40px 0;
            border: 0;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>BOOKS LIST</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th scope="col">Title</th>
            <th scope="col">Author</th>
        </tr>
        </thead>
        <tbody>
        <!-- Цикл по списку книг -->
        <tr th:each="book : ${books}">
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
        </tr>
        </tbody>
    </table>
</div>
<!-- Скрипты Bootstrap -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"
        integrity="sha384-+YQ4JLhjyBLPDQt//I+STsc9iw4uQqACwlvpsluby4M+RYE6IWOE/YxdhIQ+1ZyvUs"
        crossorigin="anonymous"></script>
</body>
</html>
