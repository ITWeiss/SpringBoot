<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New User</title>
    <!-- Подключение Bootstrap для стилизации -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
          integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <!-- Дополнительные стили для улучшения внешнего вида -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #222222;
        }

        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            color: #222222;
        }

        label {
            font-weight: bold;
            color: #444444;
            display: inline-block;
            margin-bottom: 5px;
        }

        /* Общие стили для всех полей ввода */
        input[type="text"], input[type="password"], select {
            width: 100%; /* Ширина полей */
            padding: 12px 20px; /* Внутренние отступы */
            margin-bottom: 20px; /* Внешний отступ снизу */
            border: 1px solid #ced4da; /* Граница */
            border-radius: 6px; /* Округлость углов */
            outline: none; /* Удаление выделения по умолчанию */
            transition: border-color 0.15s ease-in-out; /* Анимация изменения цвета границы */
        }

        /* Стиль при фокусировке */
        input[type="text"]:focus, input[type="password"]:focus, select:focus {
            border-color: #007bff; /* Синий цвет границы при фокусировке */
        }

        button.btn-primary {
            background-color: #007bff; /* Синий цвет кнопки */
            border: none; /* Нет рамки */
            border-radius: 6px; /* Округлость углов */
            padding: 8px 20px; /* Внутренние отступы */
            font-size: 16px; /* Размер шрифта */
            line-height: 1.5; /* Межстрочный интервал */
            color: #ffffff; /* Белый цвет текста */
            cursor: pointer; /* Курсор в виде руки при наведении */
            transition: background-color 0.15s ease-in-out; /* Анимация изменения цвета фона */
        }

        button.btn-primary:hover {
            background-color: #0056b3; /* Темно-синий цвет при наведении */
        }

        .error-message {
            color: #dc3545; /* Красный цвет ошибок */
            margin-top: 10px; /* Отступ сверху */
            display: none; /* Изначально скрытые ошибки */
        }
    </style>
</head>
<body>
<div class="container">
    <h1>ADD NEW USER</h1>
    <form action="#" th:action="@{/admin/add-user}" th:object="${user}" method="post" onsubmit="return validateForm();">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" th:field="*{username}" required/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" required/>
        </div>
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" th:field="*{role}" required>
                <option value="">Select Role</option>
                <option value="USER">User</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <span class="error-message" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Пожалуйста, введите имя пользователя.</span>
        <span class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Пожалуйста, введите пароль.</span>
        <span class="error-message" th:if="${#fields.hasErrors('role')}"
              th:errors="*{role}">Пожалуйста, выберите роль.</span>
    </form>
</div>
<!-- Скрипты Bootstrap -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"
        integrity="sha384-+YQ4JLhjyBLPDQt//I+STsc9iw4uQqACwlvpsluby4M+RYE6IWOE/YxdhIQ+1ZyvUs"
        crossorigin="anonymous"></script>
</body>
</html>
